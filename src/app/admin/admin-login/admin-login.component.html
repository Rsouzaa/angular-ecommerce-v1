<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-rose-50 via-white to-amber-50 px-4">
  <div class="w-full max-w-md">
    <!-- Card de Login -->
    <div class="bg-white rounded-lg shadow-lg p-8 border-t-4 border-red-600">
      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50,85 C25,70 15,55 15,45 C15,35 22,28 30,28 C38,28 45,35 50,42 C55,35 62,28 70,28 C78,28 85,35 85,45 C85,55 75,70 50,85 Z" fill="#e60023"/>
          <circle cx="40" cy="45" r="8" fill="#ff6b7a" opacity="0.6"/>
          <circle cx="60" cy="45" r="8" fill="#ff6b7a" opacity="0.6"/>
          <circle cx="50" cy="55" r="7" fill="#ff6b7a" opacity="0.6"/>
          <path d="M75,25 Q85,20 88,15" stroke="#e60023" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="88" cy="13" r="2" fill="#e60023"/>
        </svg>
      </div>

      <!-- Título -->
      <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">Bem-vindo</h1>
      <p class="text-center text-gray-600 mb-8">Painel do Administrador</p>

      <!-- Formulário -->
      <form (ngSubmit)="login()" class="space-y-4">
        <!-- Campo de Senha -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password"
            (keypress)="handleKeypress($event)"
            placeholder="Digite sua senha"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
            [disabled]="isLoading"
          />
        </div>

        <!-- Mensagem de Erro -->
        <div *ngIf="errorMessage" class="p-3 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-sm text-red-600">❌ {{ errorMessage }}</p>
        </div>

        <!-- Botão de Login -->
        <button 
          type="submit"
          [disabled]="isLoading"
          class="w-full py-2 px-4 bg-gradient-to-r from-red-600 to-red-500 text-white font-semibold rounded-lg hover:from-red-700 hover:to-red-600 disabled:opacity-50 disabled:cursor-not-allowed transition"
        >
          <span *ngIf="!isLoading">Acessar Painel</span>
          <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Autenticando...
          </span>
        </button>
      </form>

      <!-- Informação -->
      <p class="text-center text-xs text-gray-500 mt-6">
        Este é um acesso restrito apenas para o administrador da loja.
      </p>
    </div>
  </div>
</div>

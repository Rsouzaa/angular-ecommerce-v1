<header>
  <nav class="bg-slate-900 border-b border-slate-800">
    <div
      class="max-w-screen-lg flex flex-wrap items-center justify-between mx-auto px-4"
    >
      <a routerLink="/" class="flex items-center gap-2">
        <svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="h-10">
          <!-- Coração/Novelo -->
          <path d="M50,85 C25,70 15,55 15,45 C15,35 22,28 30,28 C38,28 45,35 50,42 C55,35 62,28 70,28 C78,28 85,35 85,45 C85,55 75,70 50,85 Z" fill="#e60023"/>
          
          <!-- Textura do novelo -->
          <circle cx="40" cy="45" r="8" fill="#ff6b7a" opacity="0.6"/>
          <circle cx="60" cy="45" r="8" fill="#ff6b7a" opacity="0.6"/>
          <circle cx="50" cy="55" r="7" fill="#ff6b7a" opacity="0.6"/>
          
          <!-- Gancho/Agulha -->
          <path d="M75,25 Q85,20 88,15" stroke="#e60023" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <circle cx="88" cy="13" r="2" fill="#e60023"/>
        </svg>
        
        <div class="flex flex-col">
          <span class="font-bold text-sm text-white leading-none">Ateliê</span>
          <span class="text-xs font-semibold text-red-600 leading-none">Divina Mix</span>
        </div>
      </a>
      <div class="flex md:order-2 rtl:space-x-reverse gap-1">
        <button
          (click)="toggleSearch()"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-300 rounded-lg hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-600"
        >
          <svg
            fill="currentColor"
            class="size-5"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
          >
            <path
              d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z"
            />
          </svg>
        </button>
        <a
          role="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-300 rounded-lg hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-600 relative"
          routerLink="/cart"
        >
          <svg
            fill="currentColor"
            class="size-5"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 576 512"
          >
            <path
              d="M0 24C0 10.7 10.7 0 24 0L69.5 0c22 0 41.5 12.8 50.6 32l411 0c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3l-288.5 0 5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5L488 336c13.3 0 24 10.7 24 24s-10.7 24-24 24l-288.3 0c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5L24 48C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z"
            />
          </svg>
          @if (cartCount > 0) {
          <span
            class="absolute top-0 right-0 bg-red-600 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"
          >
            {{ cartCount }}
          </span>
          }
        </a>

        <!-- Auth Buttons -->
        @if (customer$ | async; as customer) {
        <a
          routerLink="/account"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-300 rounded-lg hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-600"
          title="Minha Conta"
        >
          <svg fill="currentColor" class="size-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
            <path d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512l388.6 0c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304l-91.4 0z"/>
          </svg>
        </a>
        <button
          (click)="logout()"
          class="inline-flex items-center px-3 py-1 text-sm text-red-400 rounded-lg hover:bg-slate-700 hover:text-red-300 transition"
        >
          Sair
        </button>
        } @else {
        <a
          routerLink="/login"
          class="inline-flex items-center px-3 py-1 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 transition"
        >
          Entrar
        </a>
        <a
          routerLink="/register"
          class="inline-flex items-center px-3 py-1 text-sm bg-slate-700 text-gray-300 rounded-lg hover:bg-slate-600 transition"
        >
          Cadastrar
        </a>
        }

        <button
          data-collapse-toggle="navbar"
          type="button"
          class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-300 rounded-lg md:hidden hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-600"
          aria-controls="navbar"
          aria-expanded="false"
        >
          <span class="sr-only">Open main menu</span>
          <svg
            class="w-5 h-5"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 17 14"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M1 1h15M1 7h15M1 13h15"
            />
          </svg>
        </button>
      </div>
      <div
        class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
        id="navbar"
      >
        <ul
          class="flex flex-col p-4 md:p-0 mt-4 font-medium border border-slate-700 rounded-lg bg-slate-800 md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-transparent"
        >
          <li>
            <a
              routerLink="/"
              class="block py-2 px-3 text-white rounded-sm hover:bg-slate-700 md:hover:bg-transparent md:hover:text-yellow-500 md:p-0"
              aria-current="page"
              >Home</a
            >
          </li>
          <li>
            <a
              routerLink="/favorites"
              class="block py-2 px-3 text-white rounded-sm hover:bg-slate-700 md:hover:bg-transparent md:hover:text-red-600 md:p-0"
              >Favoritos ❤️</a
            >
          </li>
          @if (isAuthenticated$ | async) {
          <li>
            <a
              routerLink="/admin"
              class="block py-2 px-3 text-white rounded-sm hover:bg-slate-700 md:hover:bg-transparent md:hover:text-purple-400 md:p-0 font-semibold"
              >👨‍💼 Painel Admin</a
            >
          </li>
          }
        </ul>
      </div>
    </div>
  </nav>
  @if (isSearchOpen) {
  <div class="bg-slate-800 border-b border-slate-700 py-4">
    <div class="max-w-screen-lg mx-auto px-4">
      <form (ngSubmit)="search()" class="flex gap-2">
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (input)="onSearchInput()"
          name="search"
          placeholder="Buscar produtos..."
          class="flex-1 px-4 py-2 border border-slate-600 rounded-lg bg-slate-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500"
          autofocus
        />
        <button
          type="submit"
          class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium"
        >
          Buscar
        </button>
      </form>
    </div>
  </div>
  }
</header>

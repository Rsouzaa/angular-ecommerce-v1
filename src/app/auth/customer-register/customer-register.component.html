<main class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Criar Conta</h1>
      <p class="text-gray-600 mb-6">Cadastre-se para iniciar suas compras</p>

      <!-- Mensagem -->
      @if (message) {
      <div [class]="'mb-6 p-4 rounded-lg text-sm font-medium ' + (messageType === 'error' ? 'bg-red-50 text-red-800 border border-red-200' : 'bg-green-50 text-green-800 border border-green-200')">
        {{ message }}
      </div>
      }

      <!-- Formulário -->
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nome Completo</label>
          <input
            type="text"
            [(ngModel)]="name"
            name="name"
            placeholder="Seu nome"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"
            [disabled]="loading"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"
            [disabled]="loading"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"
            [disabled]="loading"
          />
          <p class="text-xs text-gray-500 mt-1">Mínimo 6 caracteres</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Confirmar Senha</label>
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="••••••"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"
            [disabled]="loading"
            (keyup.enter)="register()"
          />
        </div>

        <button
          type="button"
          (click)="register()"
          [disabled]="loading"
          class="w-full px-6 py-3 bg-gradient-to-r from-red-600 to-red-500 text-white font-semibold rounded-lg hover:from-red-700 hover:to-red-600 disabled:opacity-50 disabled:cursor-not-allowed transition"
        >
          @if (loading) {
          <span>Cadastrando...</span>
          } @else {
          <span>Cadastrar</span>
          }
        </button>
      </form>

      <!-- Divider -->
      <div class="mt-6 relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">Já tem conta?</span>
        </div>
      </div>

      <!-- Link para Login -->
      <button
        type="button"
        (click)="goToLogin()"
        class="w-full mt-6 px-6 py-3 border-2 border-red-600 text-red-600 font-semibold rounded-lg hover:bg-red-50 transition"
      >
        Fazer login
      </button>

      <!-- Link para Home -->
      <div class="mt-4 text-center">
        <a routerLink="/" class="text-sm text-gray-600 hover:text-gray-900 underline">
          ← Voltar para a loja
        </a>
      </div>
    </div>
  </div>
</main>

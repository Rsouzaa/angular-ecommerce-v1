<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  
  <!-- Crochê Hook -->
  <g transform="translate(50, 50) scale(0.8)">
    <!-- Handle da agulha (marrom) -->
    <rect x="-4" y="-35" width="8" height="50" rx="4" fill="#b45309"/>
    
    <!-- Hook curvo -->
    <path d="M -4 15 Q -4 28 8 28 Q 12 28 12 24" stroke="#b45309" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Novelo de fio (rosa) -->
    <circle cx="-2" cy="-38" r="12" fill="#ec4899"/>
    <circle cx="-8" cy="-32" r="5" fill="#f472b6"/>
    <circle cx="6" cy="-32" r="5" fill="#f472b6"/>
    
    <!-- Detalhe brilho -->
    <circle cx="-4" cy="-40" r="3" fill="#fbcfe8" opacity="0.7"/>
  </g>
  
  <!-- Decoração externa -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#fbcfe8" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecionando...</title>
    <script>
        // Redirecionar para index.html mantendo a rota solicitada
        const path = window.location.pathname.replace('/angular-ecommerce-v1/', '').replace(/\/$/, '');
        setTimeout(() => {
            window.location.href = '/angular-ecommerce-v1/index.html?redirect=' + encodeURIComponent('/' + path);
        }, 0);
    </script>
</head>
<body>
    <p>Redirecionando...</p>
</body>
</html>
